services:
  # Unified Docker Deployment (Recommended for Koyeb, HF, or Render)
  - type: web
    name: trustchat
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: DB_NAME
        value: apun
      - key: PORT
        value: 8000
